<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harsh — Developer & Creator</title>
  <meta name="description" content="Personal presence — Developer, Creator, Builder. A living digital identity." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET ─── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      /* Energy palette — shifted by time-of-day in JS */
      --h1: 240;
      --h2: 265;
      --h3: 200;
      --bright: 1;

      /* Pointer energy coordinates */
      --cx: 50%;
      --cy: 50%;
      --px: 0px;
      --py: 0px;

      /* Energy intensity (0–1, driven by presence) */
      --energy: 0;
      --aura-energy: 0.25;

      /* Magnetic field */
      --mag-x: 0px;
      --mag-y: 0px;

      /* Spacing rhythm — 8px base unit */
      --space-xs: 0.5rem;
      /*  8px */
      --space-sm: 1rem;
      /* 16px */
      --space-md: 1.5rem;
      /* 24px */
      --space-lg: 2rem;
      /* 32px */
      --space-xl: 2.5rem;
      /* 40px */
      --space-2xl: 3rem;
      /* 48px */

      /* Motion — deliberate, premium curves */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --duration-fast: 200ms;
      --duration-med: 400ms;
      --duration-slow: 800ms;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html,
    body {
      overflow: hidden;
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
      position: relative;
      opacity: 0;
      animation: awaken 1.4s var(--ease-out) 0.15s forwards;
    }

    @keyframes awaken {
      to {
        opacity: 1
      }
    }

    /* ─── ENERGY FIELD: Background Layers ─── */
    .bg-deep {
      position: fixed;
      inset: 0;
      z-index: -10;
      background: hsl(var(--h1), 12%, 5%);
      transition: background 4s var(--ease-smooth);
    }

    /* Subtle noise texture — adds materiality */
    .bg-deep::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.018;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    /* Ambient glow — follows pointer like radiant energy */
    .bg-ambient {
      position: fixed;
      inset: 0;
      z-index: -9;
      pointer-events: none;
      background: radial-gradient(550px circle at var(--cx) var(--cy),
          hsla(var(--h2), 50%, 45%, calc(0.12 * var(--bright))),
          transparent 70%);
      transition: background 0.5s var(--ease-smooth);
    }

    /* Energy orbs — slow-breathing ambient fields */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      z-index: -8;
      pointer-events: none;
      will-change: transform;
    }

    .orb--1 {
      width: 360px;
      height: 360px;
      background: radial-gradient(circle,
          hsla(var(--h1), 45%, 45%, calc(0.12 * var(--bright))),
          transparent 70%);
      top: -8%;
      left: -6%;
      animation: orbDrift1 28s var(--ease-smooth) infinite;
    }

    .orb--2 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle,
          hsla(var(--h2), 40%, 40%, calc(0.09 * var(--bright))),
          transparent 70%);
      bottom: -6%;
      right: -5%;
      animation: orbDrift2 34s var(--ease-smooth) infinite;
    }

    @keyframes orbDrift1 {

      0%,
      100% {
        transform: translate(0, 0) scale(1)
      }

      50% {
        transform: translate(30px, 40px) scale(1.05)
      }
    }

    @keyframes orbDrift2 {

      0%,
      100% {
        transform: translate(0, 0) scale(1)
      }

      50% {
        transform: translate(-25px, -30px) scale(1.04)
      }
    }

    /* Depth layer — parallax nebula */
    .depth-mid {
      position: fixed;
      inset: 0;
      z-index: -7;
      pointer-events: none;
      background:
        radial-gradient(ellipse 45% 35% at calc(45% + var(--px)) calc(42% + var(--py)),
          hsla(var(--h1), 30%, 40%, 0.04),
          transparent 70%);
      transition: background 0.6s var(--ease-smooth);
    }

    /* Particle canvas */
    #particles {
      position: fixed;
      inset: 0;
      z-index: -6;
      pointer-events: none;
    }

    /* ─── CONTAINER & CARD: The Vessel ─── */
    .container {
      width: 100%;
      max-width: 420px;
      padding: var(--space-xl) var(--space-md) var(--space-2xl);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
      position: relative;
    }

    .card {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(32px) saturate(1.2);
      -webkit-backdrop-filter: blur(32px) saturate(1.2);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 28px;
      padding: var(--space-2xl) var(--space-md) var(--space-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 4px 40px rgba(0, 0, 0, 0.25),
        0 1px 0 rgba(255, 255, 255, 0.04) inset;
      transition: box-shadow var(--duration-slow) var(--ease-smooth);
    }

    /* Top edge light — subtle energy line */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 12%;
      right: 12%;
      height: 1px;
      background: linear-gradient(90deg,
          transparent,
          rgba(255, 255, 255, 0.14),
          transparent);
    }

    /* Inner radiance — energy responding to presence */
    .card::after {
      content: '';
      position: absolute;
      top: -35%;
      left: -15%;
      width: 130%;
      height: 55%;
      background: radial-gradient(ellipse at 50% 100%,
          rgba(255, 255, 255, 0.018),
          transparent 70%);
      pointer-events: none;
      transition: opacity var(--duration-slow) var(--ease-smooth);
    }

    /* ─── AURA: Energy Ring ─── */
    .aura-container {
      position: relative;
      margin-bottom: var(--space-sm);
    }

    .aura {
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
    }

    .aura__ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid hsla(var(--h2), 50%, 55%, calc(var(--aura-energy) * 0.35));
      box-shadow:
        0 0 24px hsla(var(--h2), 45%, 50%, calc(var(--aura-energy) * 0.25)),
        0 0 48px hsla(var(--h1), 40%, 45%, calc(var(--aura-energy) * 0.12)),
        inset 0 0 16px hsla(var(--h2), 45%, 50%, calc(var(--aura-energy) * 0.08));
      animation: auraPulse 5s var(--ease-smooth) infinite;
      transition: box-shadow var(--duration-slow), border-color var(--duration-slow);
    }

    .aura__ring:nth-child(2) {
      inset: -10px;
      opacity: 0.35;
      animation-delay: 1.2s;
    }

    @keyframes auraPulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.7
      }

      50% {
        transform: scale(1.04);
        opacity: 1
      }
    }

    /* Aura ripple — on identity reveal */
    .aura-ripple {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid hsla(var(--h2), 50%, 60%, 0);
      pointer-events: none;
    }

    @keyframes auraRippleOut {
      0% {
        transform: scale(1);
        border-color: hsla(var(--h2), 50%, 60%, 0.3)
      }

      100% {
        transform: scale(2);
        border-color: hsla(var(--h2), 50%, 60%, 0)
      }
    }

    /* ─── PROFILE: The Core ─── */
    .profile {
      position: relative;
      cursor: pointer;
    }

    .profile__ring {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg,
          hsl(var(--h1), 50%, 50%),
          hsl(var(--h2), 45%, 45%),
          hsl(var(--h3), 45%, 50%));
      box-shadow:
        0 0 20px hsla(var(--h1), 50%, 50%, 0.2),
        0 0 40px hsla(var(--h2), 40%, 45%, 0.1);
      transition: box-shadow var(--duration-slow) var(--ease-smooth);
      animation: energyFloat 7s var(--ease-smooth) infinite;
    }

    .profile.presence-active .profile__ring {
      box-shadow:
        0 0 30px hsla(var(--h1), 55%, 50%, 0.35),
        0 0 60px hsla(var(--h2), 45%, 45%, 0.2);
    }

    @keyframes energyFloat {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    .profile__img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid hsl(var(--h1), 12%, 7%);
      background: #14141f;
    }

    .profile__status {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #22c55e;
      border: 2.5px solid hsl(var(--h1), 12%, 7%);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
      animation: statusPulse 3s var(--ease-smooth) infinite;
    }

    @keyframes statusPulse {

      0%,
      100% {
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.4)
      }

      50% {
        box-shadow: 0 0 14px rgba(34, 197, 94, 0.6)
      }
    }

    /* ─── IDENTITY REVEAL: Energy Surge ─── */
    .card.identity-reveal .aura__ring {
      box-shadow:
        0 0 40px hsla(var(--h2), 50%, 55%, 0.45),
        0 0 80px hsla(var(--h1), 45%, 50%, 0.25),
        inset 0 0 24px hsla(var(--h2), 45%, 50%, 0.15) !important;
    }

    /* ─── GREETING: Whisper ─── */
    .greeting {
      font-size: 0.75rem;
      font-weight: 400;
      color: rgba(203, 213, 225, 0.5);
      text-align: center;
      letter-spacing: 0.04em;
      margin-bottom: var(--space-xs);
      opacity: 0;
      transform: translateY(4px);
      transition:
        opacity 1s var(--ease-out),
        transform 1s var(--ease-out);
      pointer-events: none;
      font-style: italic;
      min-height: 1.2em;
      /* prevent layout shift */
    }

    .greeting.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .greeting.hidden {
      opacity: 0;
      transform: translateY(-3px);
    }

    /* ─── TYPOGRAPHY: Name & Bio ─── */
    .name {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      background: linear-gradient(135deg, #fff 25%, #c7d2fe 65%, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: revealUp 0.7s var(--ease-out) 0.4s forwards;
    }

    .bio {
      font-size: 0.88rem;
      font-weight: 400;
      color: rgba(203, 213, 225, 0.75);
      text-align: center;
      line-height: 1.6;
      max-width: 28ch;
      margin-bottom: var(--space-md);
      opacity: 0;
      animation: revealUp 0.7s var(--ease-out) 0.5s forwards;
      transition: filter var(--duration-slow), opacity var(--duration-slow);
    }

    .bio.idle {
      filter: blur(1px);
      opacity: 0.7;
    }

    .bio.focused {
      filter: blur(0);
      opacity: 1;
    }

    @keyframes revealUp {
      from {
        opacity: 0;
        transform: translateY(14px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ─── LINKS: Energy Channels ─── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      width: 100%;
      padding: 0.85rem 1.15rem;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.035);
      backdrop-filter: blur(16px) saturate(1.15);
      -webkit-backdrop-filter: blur(16px) saturate(1.15);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.18),
        0 1px 0 rgba(255, 255, 255, 0.03) inset;
      color: #dce4f0;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      transform: translate(var(--mag-x, 0px), var(--mag-y, 0px));
      transition:
        transform var(--duration-med) var(--ease-spring),
        box-shadow var(--duration-med) var(--ease-smooth),
        border-color var(--duration-med) var(--ease-smooth),
        background var(--duration-med) var(--ease-smooth);
      opacity: 0;
      animation: revealUp 0.55s var(--ease-out) both;
    }

    .link-btn:nth-child(1) {
      animation-delay: 0.6s
    }

    .link-btn:nth-child(2) {
      animation-delay: 0.68s
    }

    .link-btn:nth-child(3) {
      animation-delay: 0.76s
    }

    .link-btn:nth-child(4) {
      animation-delay: 0.84s
    }

    .link-btn:nth-child(5) {
      animation-delay: 0.92s
    }

    .link-btn:nth-child(6) {
      animation-delay: 1.0s
    }

    /* Sweep — energy transfer on hover */
    .link-btn .light-sweep {
      position: absolute;
      top: 0;
      left: -100%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
      transform: skewX(-18deg);
      transition: left 0s;
      pointer-events: none;
    }

    /* Gradient border — dormant until hovered */
    .link-btn::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 15px;
      padding: 1px;
      background: linear-gradient(135deg,
          hsla(var(--h1), 50%, 50%, 0),
          hsla(var(--h2), 45%, 45%, 0),
          hsla(var(--h3), 45%, 50%, 0));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      transition: background var(--duration-med);
      pointer-events: none;
    }

    /* Radial spotlight — follows pointer within button */
    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: radial-gradient(circle at var(--rx, 50%) var(--ry, 50%),
          hsla(var(--h2), 45%, 50%, 0.08),
          transparent 55%);
      opacity: 0;
      transition: opacity var(--duration-med);
      pointer-events: none;
    }

    @media (hover: hover) and (pointer: fine) {
      .link-btn:hover {
        transform: translate(var(--mag-x, 0px), var(--mag-y, 0px)) scale(1.03);
        background: rgba(255, 255, 255, 0.055);
        border-color: rgba(255, 255, 255, 0.1);
        box-shadow:
          0 6px 24px hsla(var(--h1), 45%, 45%, 0.1),
          0 2px 10px hsla(var(--h2), 40%, 40%, 0.06),
          0 1px 0 rgba(255, 255, 255, 0.04) inset;
      }

      .link-btn:hover::before {
        background: linear-gradient(135deg,
            hsla(var(--h1), 50%, 50%, 0.35),
            hsla(var(--h2), 45%, 45%, 0.28),
            hsla(var(--h3), 45%, 50%, 0.35));
      }

      .link-btn:hover::after {
        opacity: 1
      }

      .link-btn:hover .light-sweep {
        left: 150%;
        transition: left 0.65s var(--ease-smooth);
      }

      .link-btn:hover .link-btn__icon {
        transform: scale(1.08);
        filter: drop-shadow(0 0 4px hsla(var(--h2), 50%, 55%, 0.35));
      }

      .link-btn:hover .link-btn__arrow {
        opacity: 0.6;
        transform: translateX(2px);
      }
    }

    .link-btn:active {
      transform: translate(var(--mag-x, 0px), var(--mag-y, 0px)) scale(0.97);
      transition-duration: 100ms;
    }

    .link-btn:active::after {
      opacity: 1
    }

    .link-btn__icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--duration-fast) var(--ease-out), filter var(--duration-fast);
    }

    .link-btn__icon svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
    }

    .link-btn__label {
      flex: 1;
      text-align: left;
    }

    .link-btn__arrow {
      opacity: 0.25;
      font-size: 0.8rem;
      transition: opacity var(--duration-fast), transform var(--duration-fast) var(--ease-out);
    }

    /* ─── CLICK RIPPLE: Energy Release ─── */
    .click-ripple {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      border: 1px solid hsla(var(--h2), 50%, 65%, 0.3);
      animation: rippleExpand 0.8s var(--ease-out) forwards;
    }

    @keyframes rippleExpand {
      0% {
        width: 0;
        height: 0;
        opacity: 0.6;
        transform: translate(-50%, -50%)
      }

      100% {
        width: 240px;
        height: 240px;
        opacity: 0;
        transform: translate(-50%, -50%)
      }
    }

    /* ─── FOOTER ─── */
    .footer {
      margin-top: var(--space-md);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.28);
      text-align: center;
      opacity: 0;
      animation: revealUp 0.6s var(--ease-out) 1.2s forwards;
    }

    /* ─── PRESENCE STATES ─── */
    body.presence-idle .card {
      box-shadow:
        0 4px 30px rgba(0, 0, 0, 0.2),
        0 1px 0 rgba(255, 255, 255, 0.03) inset;
    }

    body.presence-active .card {
      box-shadow:
        0 4px 45px rgba(0, 0, 0, 0.3),
        0 1px 0 rgba(255, 255, 255, 0.05) inset;
    }

    /* ─── RESPONSIVE: Consistent at every size ─── */
    @media (min-width: 480px) {
      .container {
        padding: var(--space-2xl) var(--space-lg);
      }

      .card {
        padding: var(--space-2xl) var(--space-lg) var(--space-xl);
        border-radius: 30px;
      }

      .link-btn {
        padding: 0.9rem 1.25rem;
        border-radius: 16px;
      }

      .name {
        font-size: 1.65rem
      }
    }

    @media (min-width: 768px) {
      .card {
        padding: var(--space-2xl) var(--space-xl) var(--space-xl);
        max-width: 440px;
      }

      .link-btn {
        max-width: 380px;
        margin: 0 auto;
      }

      .links {
        align-items: center
      }
    }

    @media (min-width: 1200px) {
      .container {
        max-width: 460px
      }

      .name {
        font-size: 1.75rem
      }

      .bio {
        font-size: 0.9rem
      }
    }
  </style>
</head>

<body>
  <!-- Energy Field Layers -->
  <div class="bg-deep"></div>
  <div class="bg-ambient"></div>
  <div class="orb orb--1"></div>
  <div class="orb orb--2"></div>
  <canvas id="particles"></canvas>
  <div class="depth-mid"></div>

  <!-- The Vessel -->
  <main class="container" id="mainContainer">
    <div class="card" id="card">

      <!-- Aura + Profile Core -->
      <div class="aura-container">
        <div class="aura" id="aura">
          <div class="aura__ring"></div>
          <div class="aura__ring"></div>
        </div>
        <div class="profile" id="profile">
          <div class="profile__ring">
            <img src="profile_avatar.webp" alt="Harsh" class="profile__img" loading="eager" />
          </div>
          <span class="profile__status"></span>
        </div>
      </div>

      <!-- Greeting — contextual whisper -->
      <p class="greeting" id="greeting"></p>

      <!-- Identity -->
      <h1 class="name">Harsh</h1>
      <p class="bio idle" id="bio">Developer · Creator · Builder<br />Crafting digital experiences that matter.</p>

      <!-- Energy Channels -->
      <div class="links" id="linksContainer">
        <a href="#" class="link-btn" target="_blank" rel="noopener">
          <span class="light-sweep"></span>
